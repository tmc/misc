name: Submit Homebrew Formula

on:
  release:
    types: [published]

jobs:
  homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Get release info
        id: get_release
        uses: cardinalby/git-get-release-action@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag: ${{ github.ref_name }}
      
      - name: Create Homebrew Formula
        run: |
          cat > omni.rb << EOF
          class Omni < Formula
            desc "Tool for cross-ecosystem Go program distribution"
            homepage "https://github.com/tmc/misc/omni"
            version "${{ github.ref_name }}"
            license "MIT"
            
            if OS.mac?
              if Hardware::CPU.arm?
                url "${{ steps.get_release.outputs.assets[0].browser_download_url }}"
                sha256 "${{ steps.get_release.outputs.assets[0].content_sha256 }}"
              else
                url "${{ steps.get_release.outputs.assets[1].browser_download_url }}"
                sha256 "${{ steps.get_release.outputs.assets[1].content_sha256 }}"
              end
            elsif OS.linux?
              if Hardware::CPU.arm?
                url "${{ steps.get_release.outputs.assets[2].browser_download_url }}"
                sha256 "${{ steps.get_release.outputs.assets[2].content_sha256 }}"
              else
                url "${{ steps.get_release.outputs.assets[3].browser_download_url }}"
                sha256 "${{ steps.get_release.outputs.assets[3].content_sha256 }}"
              end
            end
            
            def install
              bin.install "omni"
            end
            
            test do
              assert_match "${{ github.ref_name }}", shell_output("#{bin}/omni version")
            end
          end
          EOF
      
      - name: Submit Pull Request to Homebrew Core
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.HOMEBREW_TOKEN }}
          branch: omni-formula-${{ github.ref_name }}
          title: "omni: add formula for version ${{ github.ref_name }}"
          body: |
            This PR adds a formula for Omni version ${{ github.ref_name }}.
            
            Omni is a tool for cross-ecosystem Go program distribution.
            
            This PR was automatically generated by the Omni release workflow.
          path: omni.rb
          commit-message: "omni: add formula for version ${{ github.ref_name }}"
          base: master
          push-to-fork: homebrew-core